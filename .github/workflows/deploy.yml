name: Deploy landing

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run visual tests
        run: npm run test:visual

  build-and-deploy:
    needs: checks
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Try to install yc cli and login into yandex cloud
        uses: lxhan/yc-install@v3
        with:
          SA_KEY: ${{secrets.YC_SA_DEPLOY_JSON_CREDENTIALS}}

      - name: Configure YC Folder Id
        run: |
          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
          echo "Folder configured successfully"

      - name: Generate bucket name
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BUCKET_NAME="landing-${TIMESTAMP}-${{ github.run_id }}"
          echo "NEW_BUCKET=$BUCKET_NAME" >> $GITHUB_ENV

      - name: Create new bucket
        run: |
          yc storage bucket create --name ${{ env.NEW_BUCKET }}

      - name: Upload files to Object Storage
        uses: yc-actions/yc-obj-storage-upload@v3
        with:
          yc-sa-json-credentials: ${{secrets.YC_SA_DEPLOY_JSON_CREDENTIALS}}
          bucket: ${{ env.NEW_BUCKET }}
          root: ./dist
          include: |
            **/*

      - name: Install envsubst
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext

      - uses: dominicwatson/github-action-envsubst@v1
        env:
          BUCKET_NAME: ${{ env.NEW_BUCKET }}
          BUCKET_READER_SERVICE_ACCOUNT_ID: ${{secrets.YC_SA_BUCKET_READER_ID}}
        with:
          files: |
            ./.yandex/landing-gateway.yaml

      - name: get current API gateway specification
        run: |
          yc serverless api-gateway get-spec ${{secrets.YC_LANDING_API_GATEWAY_ID}} > current-landing-gateway.yml

      - name: Get previous bucket name
        id: prev-bucket-id
        continue-on-error: true
        run: |
          PREV_BUCKET=$(yq '.paths["/"].get["x-yc-apigateway-integration"].bucket' current-landing-gateway.yml 2>/dev/null || true)
          echo "data=$PREV_BUCKET" >> "$GITHUB_OUTPUT"

      - name: update API gateway
        run: |
          yc serverless api-gateway update --id ${{secrets.YC_LANDING_API_GATEWAY_ID}} --spec=./.yandex/landing-gateway.yaml

      - name: Delete bucket with prev version
        if: steps.prev-bucket-id.outputs.data != ''
        run: |
          yc storage s3 rm s3://${{ steps.prev-bucket-id.outputs.data }}/ --recursive
          yc storage bucket delete --name ${{ steps.prev-bucket-id.outputs.data }}
